[Info]Name=0.Buff 生命值属性DescShort=Buff 生命值属性DescLong=决定了 Buff 生命值的初始值、上限和下限以及受伤判定[Register]****=FlagPack[****]#Health=-1                                       ; 浮点数 , 默认的 Buff 的生命值 , 仅当挂载 Buff 时输入的生命值为 0 时生效 , 负数 = 无敌 , 0 = 一碰就凉 , 默认值是 -1 , 单位 : 点                                                ; 对于非无敌的 Buff , 生命值的硬上限是 10e 点 , 无法超过这个值 , 生命值在 10e 的范围内可以一直恢复 , 但是无法恢复到【无敌】这个状态#Health.Max=None                                 ; 浮点数 , 调整 Buff 的生命值时 (恢复生命值时) 允许的生命值上限 , 负数或 None 或 N = 不限制 , 默认值是 None (不区分大小写) , 单位 : 点#Health.Min=None                                 ; 浮点数 , 调整 Buff 的生命值时 (恢复生命值时) 允许的生命值下限 , 负数或 None 或 N = 不限制 , 默认值是 None (不区分大小写) , 单位 : 点                                                ; 上下限仅对非无敌 Buff 有效#Health.Damage=no