[Info]Name=1.Buff 结束处理DescShort=Buff 结束处理DescLong=决定了 Buff 结束时的行为[Register]****=FlagPack[****]#After.Type=After                                ; 准备进入结束状态时 , Buff 何去何从 (具体激发时长取决于效果种类 , 不区分大小写) , 默认值是 After                                                ; After     = 变成结束状态                                                ; Reset     = 变成挂载状态 , 可以重新激发 , 经过 1 帧后才会切换 (硬限制)                                                ; Remove    = 移除此 Buff                                                ; Next      = 切换至新的 Buff (旧的会被移除)                                                ; AfterNext = 切换至新的 Buff (旧的会被移除) , 但是是在挂载持续时间结束之后#After.NextBuffs=                                ; Buff 列表 , 当【After.Type=Next】或【After.Type=AfterNext】时要切换为这些 Buff , 如果为空则效果等同于 Remove                                                ; 若填写当前 Buff 类型则等同于没填写 (即无法递归挂载 , 因为挂载持续时间会叠加而非挂载一个新的同类 Buff)