[Info]Name=0.Buff 效果强度DescShort=Buff 效果强度DescLong=特定Buff 所需的效果强度[Register]****=FlagPack[****]#Power.Startup=0                                 ; 浮点数 , Buff 的默认效果强度值 , 默认值是 0                                                ; 如果 After.Type=Reset , 则每次变成挂载状态时 Buff 的实际效果强度值都会被重置为此值#Power.Bases=0                                   ; 浮点数列表 , 实际效果的基础数值 , 默认值是 0Power.Mults=0                                   ; 浮点数列表 , 效果强度值的转换为实际效果的效率 , 默认值是 0#Power.Maxs=None                                 ; 浮点数列表 , 实际效果的限制条件 , 计算实际效果后的数值上限 (即实际效果的数值上限) , None 或 N = 不限制 , 默认值是 None (不区分大小写)#Power.Mins=None                                 ; 浮点数列表 , 实际效果的限制条件 , 计算实际效果后的数值下限 (即实际效果的数值下限) , None 或 N = 不限制 , 默认值是 None (不区分大小写)Power.Maxs.Total=None                           ; 浮点数列表 , 实际效果的限制条件 , 最终应用的数值的上限 (【实际数值的上下限】效果取决于效果种类的具体参数项 , 并非所有 Buff 都有效) , None 或 N = 不限制 , 默认值是 None (不区分大小写)Power.Mins.Total=None                           ; 浮点数列表 , 实际效果的限制条件 , 最终应用的数值的下限 (【实际数值的上下限】效果取决于效果种类的具体参数项 , 并非所有 Buff 都有效) , None 或 N = 不限制 , 默认值是 None (不区分大小写)Power.Maxs.Real=None                            ; 浮点数列表 , 效果强度值的限制条件 , 在效果强度值转换的过程中参与计算的效果强度值上限 , None 或 N = 不限制 , 默认值是 None (不区分大小写)Power.Mins.Real=None                            ; 浮点数列表 , 效果强度值的限制条件 , 在效果强度值转换的过程中参与计算的效果强度值下限 , None 或 N = 不限制 , 默认值是 None (不区分大小写)Power.Maxs.Effect=None                          ; 浮点数列表 , 效果强度值的限制条件 , 效果强度值生效区间上限 , 只有效果强度值小于等于此值时才参与转换 , 否则效果强度值视为 0 , None 或 N = 不限制 , 默认值时 None (不区分大小写)Power.Mins.Effect=None                          ; 浮点数列表 , 效果强度值的限制条件 , 效果强度值生效区间下限 , 只有效果强度值大于等于此值时才参与转换 , 否则效果强度值视为 0 , None 或 N = 不限制 , 默认值时 None (不区分大小写)