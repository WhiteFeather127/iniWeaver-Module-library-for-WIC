[Info]Name=1.Buff 激发处理DescShort=Buff 激发处理DescLong=决定了 Buff 挂载时的行为[Register]****=FlagPack[****]#Active.Auto=0                                   ; 整数 , 获取 Buff 后经过多久就会自动激发 , 小于 0 视为不自动激发 , 0 = 立即进入激发状态 , 默认值是 [BuffControls] -> Default.Active.Auto 的值 , 单位 : 帧Active.Auto.Set=                                ; Buff 参数设置 , 自动激发时会合并此设置#Active.Auto.Check=                              ; 判断单位条件 , 条件判断 , 需要满足所有的条件才会自动激发 , 默认值是 空                                                ; 满足 Active.Auto 之后才会判断 , Active.Auto=0 时在挂载后会立刻判断一次                                                ; 判断时来源单位是 Buff 的来源单位 , 目标单位是被挂载 Buff 的单位自己Active.Auto.CheckDelay=31                       ; 整数 , 每次判断的时间间隔 ， 小于等于 1 = 每帧检测一次 (注意性能) , 默认值是 31Active.Auto.CheckFail.Type=Continue             ; 自动激发判断失败处理类型 , 当自动激发失败时 , 会按照这里定义的类型执行后续操作 , 默认值是 Continue (不区分大小写)                                                ; Continue      = 继续判断条件 , 在等待 Active.Auto.CheckDelay 这么久之后继续尝试激发                                                ; ContinueMerge = 同 Continue , 并且给 Buff 合并 Active.Auto.CheckFail.NextBuff.Sets 的第一项 Buff 参数设置                                                ; After         = 变成结束状态                                                ; Remove        = 移除此 Buff                                                ; Next          = 切换至新的 Buff (旧的会被移除)Active.Auto.CheckFail.NextBuffs=                ; Buff 列表 , 当【Active.Auto.CheckFail.Type=Next】时要切换为这些 Buff , 如果为空则效果等同于 Remove#Active.Before=0                                 ; 整数 , 挂载 Buff 后多久才允许激发 , 小于 0 视为 0 处理 , 默认值是 0 , 单位 : 帧#Active.After=0                                  ; 整数 , 激发结束后多久才允许重复激发 , 小于 0 视为 0 处理 , 默认值是 0 , 单位 : 帧#Active.Delay=0                                  ; 整数 , 激发后多久才会生效 , 生效前 Buff 过期的话就没有效果了 , 0 = 立即进入生效状态 , 小于 0 视为 0 处理 , 默认值是 0 , 单位 : 帧#Active.Multy=no