[Info]Name=1.Buff 挂载处理DescShort=Buff 挂载处理DescLong=决定了 Buff 挂载时的行为[Register]****=FlagPack[****]#Mark.Type=Merge                                 ; 挂载类型 , 具有相同类型的 Buff 挂载在同一个单位身上时它们会合并 , 此项可以改变这个行为 , 默认值是 Merge (不区分大小写)                                                ; Merge   = 与原来的 Buff 合并 (也就是原来的行为)                                                ; Replace = 干掉原来的 Buff , 重新挂载                                                ; Next    = 使用新的 Buff 类型再次尝试挂载 (新的 Buff 类型如果也已存在且也是 Mark.Type=Next 则会再次更换 , 请注意死循环)                                                ; Multy   = 多个实例并存 , 部分情况下可能导致 "是否挂载此种 Buff 的判定" 不准确的问题 , 并且可能存在潜在的性能问题                                                ;           注意 : 这是特殊用途的解决方案 , 此类 Buff 应该用作纯效果 Buff 而非其他用途 (栗如跳板 , 触发器 , 指示器 , 火力分配等用途)                                                ; None    = 放弃挂载 , 什么都不做#Mark.NextBuffs=                                 ; Buff 列表 , 当【Mark.Type=Next】时要切换为这些 Buff , 如果为空则效果等同于 None